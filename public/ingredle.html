<html>
    <head>
        <title>Ingredle</title>

        <!-- libraries -->
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>


        <script src="ingredle.js" defer></script>
        <link rel="stylesheet" href="ingredle.css">
    </head>
    <body>
        <header>
            <h1>Ingredle</h1>
        </header>

        <nav>
            <ul>
                <li><a href="rules.html">Rules</a></li>
                <li><a href="about.html">About Us</a></li>
            </ul>
        </nav>

        <input id="username" placeholder="Enter username">
        <br>

        <div id="ingredients">Ingredients loading...</div>  

        <input id="guess" placeholder="Enter product name" required>
        <br>

        <button onclick="check()" style="background-color: lime">Guess</button>
        <button onclick="giveUp()" style="background-color: red">Give Up</button>
        <button onclick="next()" style="background-color: cyan">Next</button>

        <p id="answer"></p>

        <br><br>
        <h2>Global Leaderboard</h2>

        <canvas id="scoreChart"></canvas>

    </body>
</html>
